name: Generate Go Proto Code

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout generated repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone proto repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Moldirkab/ap2_final_generated.git proto-source

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate booking Go files
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"

          rm -rf bookingpb
          mkdir -p bookingpb

          protoc \
            --proto_path=proto-source \
            --go_out=bookingpb \
            --go_opt=paths=source_relative \
            --go-grpc_out=bookingpb \
            --go-grpc_opt=paths=source_relative \
            proto-source/booking/booking.proto

      - name: Commit and push generated code
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Generate booking protobuf code" || echo "No changes to commit"
          git push